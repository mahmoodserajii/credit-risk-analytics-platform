version: 2

models:
  - name: stg_customers
    description: "Cleaned customer master data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_type_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customer_types')
              field: customer_type_id

      - name: address_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_addresses')
              field: address_id